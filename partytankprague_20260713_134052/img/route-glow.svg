<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Abstract Prague route map</title>
<desc id="desc">Original abstract route map showing pickup, photo stop and arrival points connected by glowing lines.</desc>
<style>
  .route{stroke-dasharray:18 20;animation:move 12s linear infinite}
  .ping{transform-origin:center;animation:ping 2.6s ease-out infinite}
  .ping:nth-of-type(2){animation-delay:.5s}.ping:nth-of-type(3){animation-delay:1s}
  @keyframes move{to{stroke-dashoffset:-260}}
  @keyframes ping{0%{opacity:1;transform:scale(.7)}80%,100%{opacity:0;transform:scale(2.6)}}
</style>
<defs>
  <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(634 337) scale(738 564)">
    <stop stop-color="#111B37"/><stop offset="1" stop-color="#06080F"/>
  </radialGradient>
  <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
</defs>
<rect width="1200" height="780" rx="42" fill="url(#bg)"/>
<g opacity=".28" stroke="#fff" stroke-width="2">
  <path d="M82 162C194 230 272 198 364 250C452 300 504 268 598 304C740 360 782 448 928 430C1036 416 1090 486 1130 560"/>
  <path d="M126 620C218 560 272 498 394 512C508 524 562 452 632 402C730 332 852 296 1036 188"/>
  <path d="M260 86C328 170 394 244 376 364C360 478 420 564 502 690"/>
  <path d="M850 84C798 182 790 260 828 366C876 498 834 580 734 704"/>
</g>
<path class="route" d="M198 566C304 468 388 514 498 430C600 352 672 334 768 372C884 418 914 304 1030 214" stroke="#FFB566" stroke-width="10" stroke-linecap="round" filter="url(#blur)" opacity=".62"/>
<path class="route" d="M198 566C304 468 388 514 498 430C600 352 672 334 768 372C884 418 914 304 1030 214" stroke="#FFB566" stroke-width="5" stroke-linecap="round"/>
<g>
  <circle class="ping" cx="198" cy="566" r="20" fill="#FFB566" opacity=".5"/>
  <circle cx="198" cy="566" r="16" fill="#FFB566"/>
  <text x="228" y="572" fill="#F5F1EA" font-family="Inter, Arial" font-size="28" font-weight="700">pickup</text>
</g>
<g>
  <circle class="ping" cx="601" cy="357" r="20" fill="#8F80FF" opacity=".5"/>
  <circle cx="601" cy="357" r="16" fill="#8F80FF"/>
  <text x="631" y="363" fill="#F5F1EA" font-family="Inter, Arial" font-size="28" font-weight="700">photo stop</text>
</g>
<g>
  <circle class="ping" cx="1030" cy="214" r="20" fill="#74E3FF" opacity=".5"/>
  <circle cx="1030" cy="214" r="16" fill="#74E3FF"/>
  <text x="842" y="198" fill="#F5F1EA" font-family="Inter, Arial" font-size="28" font-weight="700">arrival</text>
</g>
<path d="M74 706H1126" stroke="#fff" stroke-opacity=".08"/>
</svg>
