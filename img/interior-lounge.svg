<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Abstract party limousine interior</title>
<desc id="desc">Original illustration of a private limo lounge interior with seats, neon ceiling and glowing bar.</desc>
<style>
  .led{stroke-dasharray:18 18;animation:led 8s linear infinite}
  .spark{animation:spark 3s ease-in-out infinite alternate}
  @keyframes led{to{stroke-dashoffset:-240}}
  @keyframes spark{from{opacity:.25;transform:translateY(0)}to{opacity:1;transform:translateY(-8px)}}
</style>
<defs>
  <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 170) rotate(90) scale(620 760)">
    <stop stop-color="#3B2A78"/>
    <stop offset=".42" stop-color="#0D1325"/>
    <stop offset="1" stop-color="#05070D"/>
  </radialGradient>
  <linearGradient id="seat" x1="121" y1="558" x2="1085" y2="558" gradientUnits="userSpaceOnUse">
    <stop stop-color="#161B2D"/>
    <stop offset=".5" stop-color="#252C43"/>
    <stop offset="1" stop-color="#101522"/>
  </linearGradient>
  <filter id="blur" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="30"/></filter>
</defs>
<rect width="1200" height="780" rx="42" fill="url(#bg)"/>
<circle cx="260" cy="150" r="110" fill="#FFB566" opacity=".18" filter="url(#blur)"/>
<circle cx="920" cy="210" r="150" fill="#8F80FF" opacity=".20" filter="url(#blur)"/>
<circle cx="630" cy="570" r="190" fill="#74E3FF" opacity=".08" filter="url(#blur)"/>
