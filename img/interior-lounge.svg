<path d="M174 506C252 430 362 392 504 392H696C838 392 948 430 1026 506V654H174V506Z" fill="url(#seat)" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
<path d="M238 532C308 476 396 450 512 450H688C804 450 892 476 962 532" stroke="#FFFFFF" stroke-opacity=".12" stroke-width="8" stroke-linecap="round"/>
