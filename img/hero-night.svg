<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Stylized night scene with a long luxury party vehicle in Prague</title>
<desc id="desc">Original abstract illustration of a long limousine driving through Prague at night with neon light trails and skyline elements.</desc>
<style>
  .trail-a{stroke-dasharray:900;stroke-dashoffset:900;animation:draw 4.8s ease-in-out infinite}
  .trail-b{stroke-dasharray:680;stroke-dashoffset:680;animation:draw 5.4s ease-in-out infinite .45s}
  .pulse{animation:pulse 2.6s ease-in-out infinite}
  .float{animation:float 6s ease-in-out infinite}
  .wheel{transform-origin:center;animation:spin 5.5s linear infinite}
  .glow{animation:glow 3.2s ease-in-out infinite alternate}
  @keyframes draw{0%{stroke-dashoffset:900;opacity:.1}42%{stroke-dashoffset:0;opacity:1}100%{stroke-dashoffset:-900;opacity:.2}}
  @keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes glow{from{opacity:.55}to{opacity:1}}
</style>
<defs>
  <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1035 168) rotate(128) scale(932 768)">
    <stop stop-color="#2C2066"/>
    <stop offset="0.39" stop-color="#11182C"/>
    <stop offset="1" stop-color="#06080F"/>
  </radialGradient>
  <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(384 444) rotate(45) scale(690 280)">
    <stop stop-color="#FFB566" stop-opacity="0.54"/>
    <stop offset="1" stop-color="#FFB566" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="road" x1="140" y1="805" x2="1270" y2="604" gradientUnits="userSpaceOnUse">
    <stop stop-color="#171B2C"/>
    <stop offset="0.46" stop-color="#0D1020"/>
    <stop offset="1" stop-color="#06070D"/>
  </linearGradient>
  <linearGradient id="body" x1="255" y1="538" x2="1095" y2="538" gradientUnits="userSpaceOnUse">
    <stop stop-color="#1A1F2E"/>
    <stop offset="0.28" stop-color="#EEF1F5"/>
    <stop offset="0.55" stop-color="#C9D0DC"/>
    <stop offset="0.83" stop-color="#F7F8F8"/>
    <stop offset="1" stop-color="#777E8D"/>
  </linearGradient>
  <linearGradient id="window" x1="401" y1="438" x2="874" y2="438" gradientUnits="userSpaceOnUse">
    <stop stop-color="#101526"/>
    <stop offset="0.36" stop-color="#202D4F"/>
    <stop offset="0.75" stop-color="#6958BD"/>
    <stop offset="1" stop-color="#FFD29B"/>
  </linearGradient>
  <filter id="blurBig" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="32"/>
  </filter>
  <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%">
    <feDropShadow dx="0" dy="38" stdDeviation="36" flood-color="#000000" flood-opacity="0.55"/>
  </filter>
</defs>
<rect width="1400" height="980" rx="56" fill="url(#bg)"/>
<rect width="1400" height="980" rx="56" fill="url(#goldGlow)"/>
